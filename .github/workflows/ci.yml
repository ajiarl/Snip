name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint

    - name: Run TypeScript type check
      run: npm run typecheck

    - name: Run unit tests
      run: npm run test

    - name: Build project
      run: npm run build

    # NOTE: E2E tests are NOT included in CI because they require:
    # - Running dev server
    # - Database connection with secrets (DATABASE_URL, SAFE_BROWSING_API_KEY)
    # Run E2E tests manually in local development: npm run test:e2e
